version: '3.8'

services:
  backend:
    build: ./calculator-backend
    container_name: calculator-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./calculator-backend:/app
    networks:
      - calculator-network
    restart: unless-stopped

  frontend:
    build: ./calculator-app
    container_name: calculator-frontend
    ports:
      - "8081:80"
    depends_on:
      - backend
    networks:
      - calculator-network
    restart: unless-stopped

networks:
  calculator-network:
    driver: bridge